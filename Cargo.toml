[package]
name = "wg-proxy"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "exit"
path = "src/exit_node.rs"

[dependencies]
anyhow = "1.0.102"
base64 = "0.22"
tokio = { version = "1.50.0", features = ["macros", "net", "rt-multi-thread"] }
tokio-wireguard = "0.1.3"
bytes = "1.11.1"
http-body-util = "0.1.3"
hyper = { version = "1.8.1", features = ["http1", "client", "server"] }
tokio-stream = "0.1.18"
http = "1.4.0"
pin-project-lite = "0.2.17"
