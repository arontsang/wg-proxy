[package]
name = "wg-proxy"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "exit"
path = "src/exit_node.rs"

[dependencies]
anyhow = "1.0.102"
boringtun = "0.7.0"
futures = { version = "0.3.32", features = [] }
futures-channel = { version = "0.3.32", features = ["futures-sink"] }
futures-core = "0.3.32"
futures-sink = "0.3.32"
lazy_static = "1.5.0"
tokio = { version = "1.50.0", features = ["macros", "net", "rt-multi-thread"] }
tokio-smoltcp = "0.5.2"

